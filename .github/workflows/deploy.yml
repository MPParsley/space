name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/space-exploration-game-8eG0u   # also deploy from feature branch during development
  workflow_dispatch:   # allow manual trigger from the GitHub Actions UI

# Permissions required by the deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments; never cancel an in-progress deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No build step — the repository root is served directly as a static site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the entire repo root; .nojekyll disables Jekyll processing
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
